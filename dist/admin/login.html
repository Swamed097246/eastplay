<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Secure SwaMedia admin login kwa kusimamia movies, series, banners na subscriptions.">
    <meta name="robots" content="noindex,nofollow">
    <meta property="og:site_name" content="SwaMedia">
    <meta property="og:type" content="website">
    <meta property="og:title" content="SwaMedia Admin Login">
    <meta property="og:description" content="Secure SwaMedia admin login.">
    <meta property="og:image" content="https://www.swamedia.online/icons/icon-512.png">
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="SwaMedia Admin Login">
    <meta name="twitter:description" content="Secure SwaMedia admin login.">
    <title>SwaMedia Admin Login</title>
    <link rel="canonical" href="https://www.swamedia.online/admin/login.html">
    <link rel="icon" href="/icons/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="min-h-screen bg-black text-slate-200">
    <main class="flex min-h-screen items-center justify-center p-4">
        <section class="w-full max-w-md rounded-2xl border border-gray-800 bg-gray-900 p-6 shadow-2xl">
            <div class="mb-6 text-center">
                <h1 class="text-3xl font-bold text-red-500">SwaMedia Admin</h1>
                <p class="mt-2 text-slate-400">Login with Firebase email and password.</p>
            </div>

            <form id="admin-login-form" class="space-y-4" autocomplete="off">
                <div>
                    <label for="email" class="mb-1 block text-sm font-medium text-slate-400">Email</label>
                    <input id="email" name="email" type="email" autocomplete="username" required class="w-full rounded-lg border border-gray-700 bg-black p-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                <div>
                    <label for="password" class="mb-1 block text-sm font-medium text-slate-400">Password</label>
                    <input id="password" name="password" type="password" autocomplete="current-password" required class="w-full rounded-lg border border-gray-700 bg-black p-3 focus:outline-none focus:ring-2 focus:ring-red-500">
                </div>
                <p id="admin-login-error" class="min-h-[20px] text-sm text-red-400"></p>
                <button id="admin-login-btn" type="submit" class="w-full rounded-lg bg-red-600 px-4 py-3 font-bold text-white transition-colors hover:bg-red-700 disabled:bg-gray-700">
                    Login to Admin
                </button>
            </form>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, browserLocalPersistence, onAuthStateChanged, setPersistence, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAAWjWH55_WogACWc3vNVWrlLrwPYPfgmo",
            authDomain: "swamediaweb.firebaseapp.com",
            databaseURL: "https://swamediaweb-default-rtdb.firebaseio.com",
            projectId: "swamediaweb",
            storageBucket: "swamediaweb.firebasestorage.app",
            messagingSenderId: "70354150749",
            appId: "1:70354150749:web:046e78eb57ce1fe427f4b4"
        };
        const ADMIN_UID = 'NeMltnUXXmX5IW66aiOsKaBnzL23';
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const loginForm = document.getElementById('admin-login-form');
        const loginButton = document.getElementById('admin-login-btn');
        const loginError = document.getElementById('admin-login-error');

        const setLoading = (isLoading) => {
            loginButton.disabled = isLoading;
            loginButton.innerHTML = isLoading
                ? '<i class="fas fa-spinner fa-spin mr-2"></i>Logging in...'
                : 'Login to Admin';
        };

        const isAdminUser = (user) => Boolean(user && user.uid === ADMIN_UID);

        const showAccessDenied = async () => {
            loginError.textContent = 'Access Denied';
            try {
                if (auth.currentUser) {
                    await signOut(auth);
                }
            } catch (error) {
                console.error('Failed to sign out non-admin user:', error);
            }
        };

        const prepareSession = async () => {
            await setPersistence(auth, browserLocalPersistence);
            onAuthStateChanged(auth, async (user) => {
                if (isAdminUser(user)) {
                    window.location.replace('./index.html');
                    return;
                }
                if (user) {
                    await showAccessDenied();
                }
            });
        };

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();
            loginError.textContent = '';
            setLoading(true);

            try {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const credential = await signInWithEmailAndPassword(auth, email, password);

                if (!isAdminUser(credential.user)) {
                    await showAccessDenied();
                    return;
                }

                window.location.replace('./index.html');
            } catch (error) {
                console.error('Admin login failed:', error);
                loginError.textContent = error?.code === 'auth/invalid-credential'
                    ? 'Email or password is incorrect.'
                    : 'Login failed. Please try again.';
            } finally {
                setLoading(false);
            }
        });

        prepareSession().catch((error) => {
            console.error('Admin auth init failed:', error);
            loginError.textContent = 'Could not prepare admin login. Refresh and try again.';
        });
    </script>
</body>
</html>
