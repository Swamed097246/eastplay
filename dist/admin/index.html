    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import { getAuth, browserLocalPersistence, onAuthStateChanged, setPersistence, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

       const firebaseConfig = {
            apiKey: "AIzaSyAAWjWH55_WogACWc3vNVWrlLrwPYPfgmo",
            authDomain: "swamediaweb.firebaseapp.com",
            databaseURL: "https://swamediaweb-default-rtdb.firebaseio.com",
            projectId: "swamediaweb",
            storageBucket: "swamediaweb.firebasestorage.app",
            messagingSenderId: "70354150749",

        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        const ADMIN_UID = 'NeMltnUXXmX5IW66aiOsKaBnzL23';
        
        const PREMIUM_PLAN_PRESETS = {
            custom_days: { label: 'Custom Days', durationMs: 0, amount: 0, durationLabel: 'Custom Days' },
            two_hours: { label: '500 - 2 Hours', durationMs: 2 * 60 * 60 * 1000, amount: 500, durationLabel: '2 Hours' },
            six_hours: { label: '1000 - 6 Hours', durationMs: 6 * 60 * 60 * 1000, amount: 1000, durationLabel: '6 Hours' },
            one_day: { label: '2000 - 1 Day', durationMs: 24 * 60 * 60 * 1000, amount: 2000, durationLabel: '1 Day' },
            one_week: { label: '3000 - 1 Week', durationMs: 7 * 24 * 60 * 60 * 1000, amount: 3000, durationLabel: '1 Week' },
            two_weeks: { label: '5000 - 2 Weeks', durationMs: 14 * 24 * 60 * 60 * 1000, amount: 5000, durationLabel: '2 Weeks' },
            one_month: { label: '9000 - 1 Month', durationMs: 30 * 24 * 60 * 60 * 1000, amount: 9000, durationLabel: '1 Month' }
        };
        let currentView = new URLSearchParams(window.location.search).get('view') || 'movies';
        let adminAuthChecked = false;
        let editId = null;
        let categoriesCache = [];
        let djGenresCache = [];
        let storyGenresCache = [];
        let moviesCache = [];
        let seriesCache = [];
        let storiesCache = [];
        let gamesCache = [];
        let adultContentCache = [];
        let connectionContentCache = [];
        let xxxContentCache = [];
        let usersCache = [];
        let watchAnalyticsUsersCache = [];
        let downloadAnalyticsUsersCache = [];
        let contentWatchAnalyticsCache = [];
        let visitAnalyticsDailyCache = [];
        let couponsCache = [];
        let movieListFilter = 'all';
        let seriesListFilter = 'all';
        let bulkHttpsMovieTitleDrafts = {};
        let bulkHttpsMovieLastSave = null;
        const CONTENT_FORM_DRAFT_PREFIX = 'swamedia_admin_content_draft_v2_';
        const MISSING_DJ_DRAFT_STORAGE_KEY = 'swamedia_missing_dj_movie_drafts_v1';
        const MISSING_DESCRIPTION_DRAFT_STORAGE_KEY = 'swamedia_missing_description_movie_drafts_v1';
        let missingDjMovieDrafts = {};
        let missingDescriptionMovieDrafts = {};
        let missingDjMovieLastSave = null;
        let missingDescriptionMovieLastSave = null;
        let isAdminInitialized = false;
        let isContentSaveInProgress = false;
        let isBulkHttpsMovieSaveInProgress = false;
        let isMissingDjMovieSaveInProgress = false;
        let isMissingDescriptionMovieSaveInProgress = false;
        let isPremiumGrantInProgress = false;
        const pendingCreateIds = {};

        try {
            missingDjMovieDrafts = JSON.parse(localStorage.getItem(MISSING_DJ_DRAFT_STORAGE_KEY) || '{}') || {};
        } catch (error) {
            missingDjMovieDrafts = {};
        }
        try {
            missingDescriptionMovieDrafts = JSON.parse(localStorage.getItem(MISSING_DESCRIPTION_DRAFT_STORAGE_KEY) || '{}') || {};
        } catch (error) {
            missingDescriptionMovieDrafts = {};
        }

        const formContainer = document.getElementById('form-container');
        const listContainer = document.getElementById('list-container');
        const listTitle = document.getElementById('list-title');
        const listViewContainer = document.getElementById('list-view-container');
        const adminPanel = document.getElementById('admin-panel');
        const adminLoginScreen = document.getElementById('admin-login-screen');
        const adminAccessDeniedScreen = document.getElementById('admin-access-denied-screen');
        const adminLogoutBtn = document.getElementById('admin-logout-btn');
        const adminSidebar = document.getElementById('admin-sidebar');
        const adminContentArea = document.getElementById('admin-content-area');
        const adminBackBtn = document.getElementById('admin-back-btn');
        const adminMobileTitle = document.getElementById('admin-mobile-title');
        const adminLoaderOverlay = document.getElementById('admin-loader-overlay');

        const inputClass = "w-full bg-gray-900 border border-gray-700 rounded-lg p-2 focus:outline-none focus:ring-2 focus:ring-red-500";
        const labelClass = "block text-sm font-medium text-slate-400 mb-1";
        const buttonClass = "bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded-lg transition-colors disabled:bg-gray-600";
        const subButtonClass = "bg-gray-600 hover:bg-gray-500 text-white font-bold py-1 px-3 rounded text-sm";
        const fieldsetStyles = "border border-gray-700 p-4 rounded-lg space-y-4";
        const legendStyles = "px-2 text-red-400 font-semibold";
        const getViewFromLocation = () => new URLSearchParams(window.location.search).get('view') || '';
        const setAdminRoute = (view, replace = false) => {
            const url = new URL(window.location.href);
            if (view) {
                url.searchParams.set('view', view);
            } else {
                url.searchParams.delete('view');
            }
            window.history[replace ? 'replaceState' : 'pushState']({ view }, '', `${url.pathname}${url.search}`);
            document.title = view ? `SwaMedia Admin | ${getDisplayName(view) || view}` : 'SwaMedia Admin';
        };
        const setButtonLoading = (button, isLoading, loadingText = 'Saving...', fallbackText = '') => {
            if (!button) return;
            if (!button.dataset.defaultHtml) {
                button.dataset.defaultHtml = button.innerHTML;
            }
            button.disabled = isLoading;
            button.innerHTML = isLoading
                ? `<i class="fas fa-spinner fa-spin mr-2"></i>${loadingText}`
                : (fallbackText || button.dataset.defaultHtml);
        };
        const setAdminLoading = (isLoading = false) => {
            if (!adminLoaderOverlay) return;
            adminLoaderOverlay.classList.toggle('active', isLoading);
        };
        const formatAdminRemainingTime = (expiryValue = 0) => {
            const remainingMs = Number(expiryValue || 0) - Date.now();
            if (remainingMs <= 0) return 'Expired';
            if (remainingMs < 60 * 1000) return `${Math.max(1, Math.ceil(remainingMs / 1000))} sec left`;
            if (remainingMs < 60 * 60 * 1000) return `${Math.max(1, Math.ceil(remainingMs / (60 * 1000)))} min left`;
            if (remainingMs < 24 * 60 * 60 * 1000) return `${Math.max(1, Math.ceil(remainingMs / (60 * 60 * 1000)))} hrs left`;
            return `${Math.max(1, Math.ceil(remainingMs / (24 * 60 * 60 * 1000)))} days left`;
        };
        const getTodayKey = () => new Date().toISOString().slice(0, 10);
        const getUserWatchAnalytics = (userId = '') => watchAnalyticsUsersCache.find(item => item.id === userId || item.userId === userId) || null;
        const getUserDownloadAnalytics = (userId = '') => downloadAnalyticsUsersCache.find(item => item.id === userId || item.userId === userId) || null;
        const getRecentWatchedTitles = (analytics = null) => {
            if (!analytics?.history) return [];
            return Object.values(analytics.history)
                .filter(Boolean)
                .sort((a, b) => Number(b.watchedAt || 0) - Number(a.watchedAt || 0))
                .slice(0, 3);
        };
        const getRecentDownloadedTitles = (analytics = null) => {
            if (!analytics?.history) return [];
            return Object.values(analytics.history)
                .filter(Boolean)
                .sort((a, b) => Number(b.downloadedAt || 0) - Number(a.downloadedAt || 0))
                .slice(0, 3);
        };
        const formatTrackedEntryLabel = (entry = {}) => {
            const baseTitle = entry.title || 'Untitled';
            const seasonNumber = Number(entry.seasonNumber || 0);
            const episodeNumber = Number(entry.episodeNumber || 0);
            if (seasonNumber > 0 && episodeNumber > 0) return `${baseTitle} (S${seasonNumber} E${episodeNumber})`;
            if (episodeNumber > 0) return `${baseTitle} (Episode ${episodeNumber})`;
            return baseTitle;
        };
        const getContentViewsToday = () => contentWatchAnalyticsCache.reduce((total, item) => total + Number(item?.daily?.[getTodayKey()] || 0), 0);
        const getSortedContentViewsByDay = () => [...contentWatchAnalyticsCache]
            .sort((a, b) => Number(b?.daily?.[getTodayKey()] || 0) - Number(a?.daily?.[getTodayKey()] || 0));
        const getVisitEntriesByDay = () => [...visitAnalyticsDailyCache]
            .sort((a, b) => String(b.id || '').localeCompare(String(a.id || '')));
        const getUniqueVisitorsForDay = (dayKey = getTodayKey()) => {
            const entry = visitAnalyticsDailyCache.find(item => item.id === dayKey);
            return Object.keys(entry?.users || {}).length;
        };
        const generateCouponCodeValue = () => `SWA${Math.random().toString(36).slice(2, 6).toUpperCase()}${Date.now().toString().slice(-3)}`;
        const getCouponScopeOptions = () => ([
            { value: 'all', label: 'Full Premium' },
            { value: 'movies_only', label: 'Movies Only' },
            { value: 'series_only', label: 'Series Only' },
            { value: 'adult_only', label: 'Wakubwa Tu Only' },
            { value: 'xxx_only', label: 'SwaX Page Only' },
            { value: 'connection_only', label: 'Connection Only' },
            { value: 'content_only', label: 'Specific Movie / Series' }
        ]);
        const getCouponContentOptionsHtml = () => {
            const allItems = [
                ...moviesCache.map(item => ({ ...item, type: 'movie' })),
                ...seriesCache.map(item => ({ ...item, type: 'series' })),
                ...adultContentCache.map(item => ({ ...item, type: 'adult' })),
                ...xxxContentCache.map(item => ({ ...item, type: 'xxx' })),
                ...connectionContentCache.map(item => ({ ...item, type: 'connection' }))
            ];
            return allItems
                .sort((a, b) => String(a.title || '').localeCompare(String(b.title || '')))
                .map(item => `<option value="${item.type}::${item.id}">${escapeHtml(item.title || 'Untitled')} (${item.type})</option>`)
                .join('');
        };

        const getDisplayName = (view) => {
            const names = {
                movies: 'Movie',
                series: 'Series',
                games: 'Game',
                genres: 'Genre',
                djgenres: 'DJ Genre',
                adultContent: 'Wakubwa Tu Content',
                connection: 'Connection Content',
                xxx: 'SwaX Content',
                stories: 'Story',
                'story-genres': 'Story Genre',
                banners: 'Home Banner',
                'series-banners': 'Series Banner',
                'story-banners': 'Story Banner',
                'connection-banners': 'Connection Banner',
                'xxx-banners': 'SwaX Banner',
                'swa-media-ads': 'SwaMedia Ad',
                'update-ad': 'Update App Ad',
                'feedback': 'Maoni',
                subscriptions: 'Paid / Unpaid',
                coupons: 'Coupons'
            };
            return names[view] || view;
        };
        
        const getCategoryOptions = (selectedCategory = "") => {
            let options = '<option value="">-- Select Category --</option>';
            categoriesCache.forEach(c => {
                options += `<option value="${c.name}" ${selectedCategory === c.name ? 'selected' : ''}>${c.name}</option>`;
            });
            return options;
        };
        
        const getDjGenreOptions = (selectedDj = "") => {
            let options = '<option value="">-- Select DJ --</option>';
            djGenresCache.forEach(c => {
                options += `<option value="${c.name}" ${selectedDj === c.name ? 'selected' : ''}>${c.name}</option>`;
            });
            return options;
        };

        const getStoryGenreOptions = (selectedGenre = "") => {
            let options = '<option value="">-- Select Story Genre --</option>';
            storyGenresCache.forEach(c => {
                options += `<option value="${c.name}" ${selectedGenre === c.name ? 'selected' : ''}>${c.name}</option>`;
            });
            return options;
        };

        const escapeHtml = (value = '') => String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');

        const normalizeDuplicateValue = (value = '') => String(value).replace(/\s+/g, ' ').trim().toLowerCase();

        const getContentCacheByView = (view) => {
            const viewCacheMap = {
                movies: moviesCache,

            let interval = seconds / 31536000;
            if (interval > 1) { const val = Math.floor(interval); return `${val} ${val === 1 ? 'year' : 'years'} ago`; }
            interval = seconds / 2592000;
            if (interval > 1) { const val = Math.floor(interval); return `${val} ${val === 1 ? 'month' : 'months'} ago`; }
            interval = seconds / 86400;
            if (interval > 1) { const val = Math.floor(interval); return `${val} ${val === 1 ? 'day' : 'days'} ago`; }
            interval = seconds / 3600;
            if (interval > 1) { const val = Math.floor(interval); return `${val} ${val === 1 ? 'hour' : 'hours'} ago`; }
            interval = seconds / 60;
            if (interval > 1) { const val = Math.floor(interval); return `${val} ${val === 1 ? 'minute' : 'minutes'} ago`; }
            return `${Math.max(1, Math.floor(seconds))} seconds ago`;

        const handlePushNotificationSubmit = async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Sending...';

            const FCM_SERVER_KEY = "PASTE_YOUR_SERVER_KEY_HERE";
            if (FCM_SERVER_KEY === "PASTE_YOUR_SERVER_KEY_HERE") {
                alert("Error: Please set your FCM_SERVER_KEY in admin.html.");
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send to All Users';
                return;
            }

            try {
                const tokensSnap = await get(ref(db, 'fcmTokens'));
                if (!tokensSnap.exists()) {
                    throw new Error("No users have enabled notifications.");
                }

                const allTokens = Object.keys(tokensSnap.val());
                if (allTokens.length === 0) {
                     throw new Error("No users have enabled notifications.");
                }

                const notificationPayload = {
                    notification: {
                        title: document.getElementById('fcm-title').value,
                        body: document.getElementById('fcm-message').value,
                        icon: document.getElementById('fcm-icon').value || window.location.origin + '/images/icon-192x192.png',
                        click_action: document.getElementById('fcm-click-action').value || window.location.origin
                    },
                    registration_ids: allTokens
                };
                
                const response = await fetch('https://fcm.googleapis.com/fcm/send', {
                    method: 'POST',
                    headers: {
                        'Authorization': `key=${FCM_SERVER_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(notificationPayload)
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`FCM Error: ${JSON.stringify(errorData)}`);
                }
                
                const responseData = await response.json();
                alert(`Notification sent successfully to ${responseData.success} devices! (${responseData.failure} failures)`);
                e.target.reset();

            } catch (error) {
                console.error('Error sending push notification:', error);
                alert(`An error occurred: ${error.message}`);
            } finally {
                 submitBtn.disabled = false;
                 submitBtn.innerHTML = '<i class="fas fa-paper-plane mr-2"></i>Send to All Users';
            }
        };

        const cleanDjNameCandidate = (value = '') => String(value || '')
            .replace(/^[\s\-:;,.]+|[\s\-:;,.]+$/g, '')
            .replace(/\s+/g, ' ')
            .trim();

        const extractDjNameFromTitle = (title = '') => {
            const parts = String(title || '').split('|').map(cleanDjNameCandidate).filter(Boolean);
            if (parts.length < 2) return '';
            const candidate = parts[parts.length - 1];
            if (!candidate || candidate.length > 42 || /^\d{4}$/.test(candidate)) return '';
            return candidate;
        };

            });

                title: partEl.querySelector('.part-title')?.value || '',

             const errorEl = document.getElementById('user-form-error');
             setButtonLoading(submitBtn, true, 'Processing...', 'Grant Premium Access');
             errorEl.textContent = '';

             const userId = document.getElementById('user-uid').value.trim();
             const actionType = document.getElementById('premium-action-select').value;
             const selectedPlanKey = document.getElementById('premium-plan-select').value;
             const customDays = parseInt(document.getElementById('premium-days').value, 10);
             const selectedPlan = PREMIUM_PLAN_PRESETS[selectedPlanKey] || PREMIUM_PLAN_PRESETS.custom_days;
             const durationMs = selectedPlanKey === 'custom_days'
                ? (isNaN(customDays) || customDays <= 0 ? 0 : customDays * 24 * 60 * 60 * 1000)
                : Number(selectedPlan.durationMs || 0);
             const durationLabel = selectedPlanKey === 'custom_days' ? `${customDays} Days` : selectedPlan.durationLabel;
             const amount = selectedPlan.amount || 0;

             if (!userId || durationMs <= 0) {
                 errorEl.textContent = 'Please enter a valid User ID and select a valid premium plan.';
                 setButtonLoading(submitBtn, false, '', 'Grant Premium Access');
                 isPremiumGrantInProgress = false;
                 return;
             }

             try {
                const userRef = ref(db, `users/${userId}`);
                const userSnap = await get(userRef);

                if (!userSnap.exists()) {
                    throw new Error('User not found. Please check the ID.');
                }
                
                const userData = userSnap.val();
                const now = Date.now();
                const currentExpiry = (userData.premiumExpiry && userData.premiumExpiry > now) ? userData.premiumExpiry : now;
                const actionDirection = actionType === 'remove' ? -1 : 1;
                const proposedExpiry = currentExpiry + (durationMs * actionDirection);
                const newExpiry = Math.max(0, proposedExpiry);
                const isPaid = newExpiry > now;
                const updatedDaysRemaining = isPaid
                    ? Math.max(0, Math.ceil((newExpiry - now) / (24 * 60 * 60 * 1000)))
                    : 0;

                    : 'Expired';

                    ? Number(userData.subscriptionAmount || 0)
                    : amount;
                const lastPremiumPaymentAt = actionType === 'remove'
                    ? Number(userData.lastPremiumPaymentAt || now)
                    : now;

                await update(userRef, {
                    premiumExpiry: newExpiry,
                    subscriptionStatus: isPaid ? 'paid' : 'unpaid',
                    subscriptionPlanLabel: updatedPlanLabel,
                    subscriptionAmount: updatedAmount,
                    lastPremiumPaymentAt: lastPremiumPaymentAt,

                const expiryText = newExpiry > 0 ? new Date(newExpiry).toLocaleString() : 'Expired';

                document.querySelectorAll('.admin-nav-item').forEach(btn => btn.classList.toggle('bg-gray-800', btn.dataset.view === currentView));
                document.getElementById('admin-search-bar').value = '';
                document.getElementById('admin-search-bar').placeholder = currentView ? `Search in ${getDisplayName(currentView) || currentView}...` : 'Search...';
                renderForm();
                if (currentView) {
                    renderList(currentView);
                }
            });

            document.addEventListener('click', (e) => {
                const deleteBtn = e.target.closest('.delete-btn');
                const editBtn = e.target.closest('.edit-btn');
                const feedbackReplyBtn = e.target.closest('.feedback-reply-btn');
                const notificationReplyBtn = e.target.closest('.notification-reply-btn');
                const notificationDeleteReplyBtn = e.target.closest('.notification-delete-reply-btn');
                const notificationBlockUserBtn = e.target.closest('.notification-block-user-btn');
                
                if (feedbackReplyBtn) {
                    handleFeedbackReply(feedbackReplyBtn.dataset.id);
                } else if (notificationReplyBtn) {
                    handleNotificationReply(notificationReplyBtn.dataset.notificationId, notificationReplyBtn.dataset.replyId || '');
                } else if (notificationDeleteReplyBtn) {
                    handleDeleteNotificationReply(notificationDeleteReplyBtn.dataset.notificationId, notificationDeleteReplyBtn.dataset.replyId);
                } else if (notificationBlockUserBtn) {
                    handleBlockActor(notificationBlockUserBtn.dataset.actorId);
                } else if (deleteBtn) {
                    handleDelete(e);
                } else if (editBtn) {
                    handleEdit(e);
                }
            });

            document.addEventListener('input', (e) => {
                const bulkHttpsTitleInput = e.target.closest('[data-bulk-https-title-input="1"]');
                if (bulkHttpsTitleInput) {
                    handleBulkHttpsMovieTitleInput(bulkHttpsTitleInput);
                }
                const missingDescriptionInput = e.target.closest('[data-missing-description-input="1"]');
                if (missingDescriptionInput) {
                    handleMissingDescriptionMovieInput(missingDescriptionInput);
                }
            });

            document.addEventListener('change', (e) => {
                const missingDjSelect = e.target.closest('[data-missing-dj-select="1"]');
                if (missingDjSelect) {
                    handleMissingDjMovieSelect(missingDjSelect);
                }
            });
        };

        adminLogoutBtn?.addEventListener('click', handleAdminLogout);
        adminBackBtn?.addEventListener('click', handleBackToAdminMenu);

        const bootstrapAdminApp = async () => {
            try {
                await setPersistence(auth, browserLocalPersistence);
                onAuthStateChanged(auth, async (user) => {
                    if (!user) {
                        adminAuthChecked = false;
                        showAdminLogin();
                        return;
                    }

                    if (!isAdminUser(user)) {
                        adminAuthChecked = false;
                        showAccessDenied();
                        return;
                    }

                    adminAuthChecked = true;
                    showAdminPanel();
                    await initAdmin();
                });
            } catch (error) {
                console.error('Admin auth bootstrap failed:', error);
                showAdminLogin();
            }
        };

        bootstrapAdminApp();
    </script>
</body>
</html>
